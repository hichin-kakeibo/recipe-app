<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>レシピスクショ収納</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="app-header">
      <h1>📸 レシピスクショ収納</h1>
      <p>スクショをタグでまとめて、あとからすぐ探せる</p>
    </header>

    <main class="container">
      <section class="panel form-panel">
        <h2 id="form-title">スクショを保存</h2>
        <form id="recipe-form">
          <input type="hidden" id="recipe-id" />

          <label for="imageFile">レシピ画像 *</label>
          <input id="imageFile" name="imageFile" type="file" accept="image/*" />
          <p class="hint">画像を変更しない編集時は、未選択のままでOKです。</p>

          <label for="name">レシピ名 *</label>
          <input id="name" name="name" type="text" required maxlength="80" placeholder="例: 豚こま冷凍ストック炒め" />

          <label for="tags">タグ（カンマ区切り）*</label>
          <input id="tags" name="tags" type="text" required placeholder="豚肉, 冷凍, 作り置き" />

          <div class="tag-suggestions" id="tag-suggestions"></div>

          <label for="memo">メモ</label>
          <textarea id="memo" name="memo" rows="3" placeholder="子どもOK。レンチンで仕上げ可能。" ></textarea>

          <label class="favorite-input">
            <input id="favorite" type="checkbox" />
            お気に入りにする
          </label>

          <div class="form-actions">
            <button type="submit" class="btn primary" id="save-btn">保存する</button>
            <button type="button" class="btn" id="cancel-edit" hidden>編集をキャンセル</button>
          </div>
        </form>
      </section>

      <section class="panel list-panel">
        <div class="search-row">
          <input id="search-input" type="text" placeholder="キーワード検索（名前・タグ・メモ）" />
          <button class="btn" type="button" id="toggle-tags">タグ一覧</button>
          <label class="favorite-filter">
            <input id="favorite-only" type="checkbox" />
            お気に入りのみ
          </label>
        </div>

        <div id="filter-tags" class="filter-tags" hidden></div>
        <div id="active-filters" class="active-filters"></div>

        <div id="recipe-list" class="recipe-list" aria-live="polite"></div>
      </section>
    </main>

    <dialog id="image-modal" class="image-modal">
      <button id="close-modal" class="modal-close" type="button" aria-label="閉じる">×</button>
      <img id="modal-image" alt="拡大画像" />
      <p id="modal-title"></p>
    </dialog>

    <template id="recipe-card-template">
      <article class="recipe-card">
        <button class="image-button" type="button">
          <img class="card-image" alt="レシピ画像" />
        </button>
        <div class="card-content">
          <div class="card-top-row">
            <h3 class="card-title"></h3>
            <button class="icon-btn favorite-btn" type="button" aria-label="お気に入り切り替え">☆</button>
          </div>
          <p class="card-text card-memo"></p>
          <div class="tag-list"></div>
          <div class="card-actions">
            <button class="btn small edit-btn" type="button">編集</button>
            <button class="btn small danger delete-btn" type="button">削除</button>
          </div>
        </div>
      </article>
    </template>

    <script src="script.js"></script>
  </body>
</html>
